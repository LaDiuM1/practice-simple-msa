server:
  port: 8090

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: practice-simple-msa
  jpa:
    hibernate:
      ddl-auto: update
    database: postgresql
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: ${DB_LOGIN_ID}
    password: ${DB_LOGIN_PASSWORD}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: practice-simple-msa
      auto-offset-reset: earliest

openai:
  api-key: ${OPENAI_API_KEY:}
  chat:
    enabled: true
    model: gpt-5.4-mini
  embedding:
    enabled: true
    model: text-embedding-3-small
  image-analysis:
    model: gpt-5.4-nano
  image:
    model: gpt-image-1-mini

jwt:
  private-key: ${JWT_SECRET_KEY}
  public-key: ${JWT_PUBLIC_KEY}
  access-expired-time: 30m
  refresh-expired-time: 14d
