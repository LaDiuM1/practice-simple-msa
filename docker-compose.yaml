services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: practice-msa-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_LOGIN_ID:-postgres}
      POSTGRES_PASSWORD: ${DB_LOGIN_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_LOGIN_ID:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.9.1
    container_name: practice-msa-kafka
    ports:
      - "9092:9092"

volumes:
  postgres-data:
